<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ROE Visual | 诊断录入系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --gold: #c5a059; --bg: #0b0b0b; }
        body { background: var(--bg); color: #ddd; font-family: -apple-system, sans-serif; }
        .form-card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 18px; margin-bottom: 16px; }
        .label-text { color: #888; font-size: 12px; margin-bottom: 8px; display: block; }
        input, select, textarea { width: 100%; background: #000; border: 1px solid #444; padding: 12px; color: #fff; border-radius: 8px; outline: none; }
        .btn-gold { background: var(--gold); color: #000; font-weight: bold; padding: 16px; width: 100%; border-radius: 8px; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto">
        <h1 class="text-xl font-bold text-center mb-6" style="color:var(--gold)">ROE WECOM SYNC</h1>

        <div class="form-card">
            <span class="label-text">条码 / Barcode</span>
            <input type="text" id="sn" placeholder="请输入条码...">
        </div>

        <div class="form-card">
            <span class="label-text">维修内容 / Repair Content</span>
            <select id="repairType">
                <option value="撞灯刮灯/Impact&Scratch">撞灯刮灯 / Impact & Scratch</option>
                <option value="灯珠缺陷/LED Defect">灯珠缺陷 / LED Defect</option>
                <option value="芯片/ IC">芯片维修 / IC Repair</option>
                <option value="电阻/Resistor">电阻维修 / Resistor</option>
                <option value="其他维修/Other Repairs">其他维修 / Others</option>
            </select>
        </div>

        <div class="form-card">
            <span class="label-text">备注 / Remark</span>
            <textarea id="note" rows="2" placeholder="填写位号..."></textarea>
        </div>

        <button class="btn-gold" id="submitBtn" onclick="submitData()">确认提交数据</button>
        <p id="msg" class="text-center mt-4 text-sm"></p>
    </div>

<script>
    // 【重要】请在这里替换为你刚刚复制的、以 /exec 结尾的链接
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwcVmwuRPi4zz3f8aLwdxtlh9780e67pBHuheLQA6TaOriKNXq4B4teeXYGYxvooCYt/exec';

    async function submitData() {
        const btn = document.getElementById('submitBtn');
        const msg = document.getElementById('msg');
        const sn = document.getElementById('sn').value.trim();

        if (!sn) return alert("请输入条码");

        btn.disabled = true;
        msg.innerText = "正在同步中...";

        const formData = new URLSearchParams();
        formData.append('sn', sn);
        formData.append('issue', document.getElementById('repairType').value);
        formData.append('note', document.getElementById('note').value);
        formData.append('qty', '1');

        try {
            // 使用简化的 fetch 方式
            await fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors', // 解决大部分跨域 405 问题
                body: formData
            });

            // 因为是 no-cors，我们拿不到具体的 response 内容，但如果没报错通常就是发出了
            msg.style.color = "#c5a059";
            msg.innerText = "✅ 数据已发送 (请检查 Google Sheet)";
            document.getElementById('sn').value = '';
            document.getElementById('note').value = '';
            alert("提交指令已发出，请稍后检查表格。");

        } catch (e) {
            msg.style.color = "#ff4444";
            msg.innerText = "❌ 提交失败";
            alert("错误: " + e.message);
        } finally {
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
