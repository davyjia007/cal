<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ROE Visual | 维修快速录入</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --gold: #c5a059; --bg: #0b0b0b; }
        body { background: var(--bg); color: #ddd; font-family: -apple-system, sans-serif; }
        .form-card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 18px; margin-bottom: 16px; }
        .label-text { color: #888; font-size: 12px; text-transform: uppercase; margin-bottom: 8px; display: block; font-weight: 600; }
        input, select, textarea { width: 100%; background: #000; border: 1px solid #444; padding: 14px; color: #fff; border-radius: 8px; outline: none; font-size: 16px; }
        input:focus { border-color: var(--gold); }
        .btn-gold { background: var(--gold); color: #000; font-weight: 800; padding: 16px; width: 100%; border-radius: 8px; cursor: pointer; font-size: 16px; transition: 0.2s; }
        .btn-gold:active { transform: scale(0.97); opacity: 0.9; }
        .btn-gold:disabled { background: #444; color: #888; }
        .accent-gold { color: var(--gold); }
    </style>
</head>
<body class="p-4 pb-12">

    <div class="max-w-md mx-auto">
        <header class="py-8 text-center">
            <h1 class="text-2xl font-black italic accent-gold tracking-tight">ROE QUICK LOG</h1>
            <p class="text-[10px] text-gray-500 tracking-[0.3em] mt-1">DIRECT WECOM SYNC</p>
        </header>

        <div class="form-card">
            <span class="label-text">条码 / Barcode</span>
            <input type="text" id="sn" placeholder="点击扫码或输入..." autocomplete="off">
        </div>

        <div class="form-card">
            <span class="label-text">维修内容 / Repair Content</span>
            <select id="repairType">
                <option value="撞灯刮灯/Impact&Scratch">撞灯刮灯 / Impact & Scratch</option>
                <option value="灯珠缺陷/LED Defect">灯珠缺陷 / LED Defect</option>
                <option value="芯片/ IC">芯片维修 / IC Repair</option>
                <option value="电阻/Resistor">电阻维修 / Resistor</option>
                <option value="更换面罩/Replace Mask">更换面罩 / Replace Mask</option>
                <option value="其他维修/Other Repairs">其他维修 / Others</option>
            </select>
        </div>

        <div class="form-card">
            <span class="label-text">数量 / Qty (默认 1)</span>
            <input type="number" id="qty" value="1" min="0">
        </div>

        <div class="form-card">
            <span class="label-text">备注 / Remark</span>
            <textarea id="note" rows="3" placeholder="填写位号或其他说明..."></textarea>
        </div>

        <button class="btn-gold shadow-lg shadow-yellow-900/20" id="submitBtn" onclick="submitData()">
            立即提交 (SUBMIT)
        </button>
        
        <p id="msg" class="text-center mt-6 text-sm font-medium"></p>
    </div>

<script>
    // 你的 Google 脚本中转地址
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwcVmwuRPi4zz3f8aLwdxtlh9780e67pBHuheLQA6TaOriKNXq4B4teeXYGYxvooCYt/exec';

    async function submitData() {
        const btn = document.getElementById('submitBtn');
        const msg = document.getElementById('msg');
        const sn = document.getElementById('sn').value.trim();

        if (!sn) {
            alert("请输入条码！");
            return;
        }

        btn.disabled = true;
        msg.innerText = "⏳ 正在同步至企业微信...";
        msg.style.color = "#888";

        const params = new URLSearchParams();
        params.append('sn', sn);
        params.append('issue', document.getElementById('repairType').value);
        params.append('qty', document.getElementById('qty').value);
        params.append('note', document.getElementById('note').value);

        try {
            await fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                body: params
            });

            msg.style.color = "#c5a059";
            msg.innerHTML = "✅ 提交成功！数据已入库";
            
            // 提交成功后只清空条码和备注，方便连续录入
            document.getElementById('sn').value = '';
            document.getElementById('note').value = '';
            document.getElementById('sn').focus();

        } catch (e) {
            msg.style.color = "#ff4444";
            msg.innerText = "❌ 提交异常，请重试";
        } finally {
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
