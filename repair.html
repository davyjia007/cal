<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ROE Visual | 诊断录入系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --gold: #c5a059; --bg: #0b0b0b; }
        body { background: var(--bg); color: #ddd; font-family: -apple-system, sans-serif; }
        .form-card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 18px; margin-bottom: 16px; }
        .label-text { color: #888; font-size: 12px; margin-bottom: 8px; display: block; letter-spacing: 1px; }
        input, select, textarea { width: 100%; background: #000; border: 1px solid #444; padding: 12px; color: #fff; border-radius: 8px; outline: none; }
        input:focus { border-color: var(--gold); }
        .btn-gold { background: var(--gold); color: #000; font-weight: bold; padding: 16px; width: 100%; border-radius: 8px; transition: 0.3s; }
        .btn-gold:active { transform: scale(0.98); opacity: 0.8; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto">
        <h1 class="text-xl font-bold text-center mb-6 italic" style="color:var(--gold)">ROE WECOM SYNC</h1>

        <div class="form-card">
            <span class="label-text">条码 / Barcode</span>
            <input type="text" id="sn" placeholder="请扫描或输入条码...">
        </div>

        <div class="form-card">
            <span class="label-text">维修内容 / Repair Content</span>
            <select id="repairType">
                <option value="撞灯刮灯/Impact&Scratch">撞灯刮灯 / Impact & Scratch</option>
                <option value="灯珠缺陷/LED Defect">灯珠缺陷 / LED Defect</option>
                <option value="芯片/ IC">芯片维修 / IC Repair</option>
                <option value="电阻/Resistor">电阻维修 / Resistor</option>
                <option value="其他维修/Other Repairs">其他维修 / Others</option>
            </select>
        </div>

        <div class="form-card">
            <span class="label-text">备注 / Remark</span>
            <textarea id="note" rows="2" placeholder="填写故障位号或详细说明..."></textarea>
        </div>

        <button class="btn-gold" id="submitBtn" onclick="submitData()">确认提交数据</button>
        <p id="msg" class="text-center mt-4 text-sm font-medium"></p>
    </div>

<script>
    // 【重要】请在此处替换为你最新的 Google 脚本部署 URL (以 /exec 结尾)
    const scriptURL = '在此处粘贴你的最新URL';

    async function submitData() {
        const btn = document.getElementById('submitBtn');
        const msg = document.getElementById('msg');
        const sn = document.getElementById('sn').value.trim();

        if (!sn) return alert("请输入条码 / Barcode is required");

        btn.disabled = true;
        msg.innerText = "⏳ 正在同步数据...";
        msg.style.color = "#888";

        // 使用 URLSearchParams 以确保跨域兼容性更好
        const formData = new URLSearchParams();
        formData.append('sn', sn);
        formData.append('issue', document.getElementById('repairType').value);
        formData.append('note', document.getElementById('note').value);
        formData.append('qty', '1');

        try {
            // 注意：去掉 mode: 'no-cors' 才能读取 Google 的回信
            const response = await fetch(scriptURL, {
                method: 'POST',
                body: formData
            });

            const result = await response.text();
            
            // 弹出反馈信息
            alert("系统反馈：\n" + result);

            if (result.includes('"errmsg":"ok"') || result === "Success") {
                msg.style.color = "#c5a059";
                msg.innerText = "✅ 数据已成功同步！";
                document.getElementById('sn').value = '';
                document.getElementById('note').value = '';
            } else {
                msg.style.color = "#ff4444";
                msg.innerText = "❌ 提交失败，详情见弹窗";
            }
        } catch (e) {
            msg.style.color = "#ff4444";
            msg.innerText = "❌ 无法连接服务器，请检查部署权限";
            alert("网络错误或部署地址无效: " + e.message);
        } finally {
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
