<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROE Visual | 高级维修系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --gold: #c5a059; --bg: #0b0b0b; }
        body { background: var(--bg); color: #ddd; font-family: sans-serif; }
        .form-card { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .label-text { color: #888; font-size: 11px; text-transform: uppercase; margin-bottom: 5px; display: block; }
        input, select, textarea { width: 100%; background: #000; border: 1px solid #444; padding: 10px; color: #fff; border-radius: 4px; outline: none; }
        input:focus { border-color: var(--gold); }
        .btn-gold { background: var(--gold); color: #000; font-weight: bold; padding: 12px; width: 100%; border-radius: 4px; cursor: pointer; }
        
        /* 简易坐标模拟器 */
        .coord-grid { display: grid; grid-template-columns: repeat(16, 1fr); gap: 2px; background: #333; padding: 2px; aspect-ratio: 1/1; margin-top: 10px; }
        .pixel { background: #111; aspect-ratio: 1/1; cursor: pointer; }
        .pixel:hover { background: var(--gold); }
        .pixel.active { background: #ff4444; }
    </style>
</head>
<body class="p-4">

    <div class="max-w-md mx-auto">
        <h1 style="color:var(--gold)" class="text-xl font-black mb-4 italic">ADVANCED REPAIR LOG</h1>

        <div class="form-card">
            <span class="label-text">条码 / Barcode (V8T等请手动输入)</span>
            <input type="text" id="sn" placeholder="输入模组 SN 码...">
        </div>

        <div class="form-card">
            <span class="label-text">维修内容 / Repair Content</span>
            <select id="repairType" onchange="toggleFields()">
                <option value="o5a5Nj">撞灯刮灯 / Impact & Scratch</option>
                <option value="oIkcgN">灯珠缺陷 / LED Defect (毛毛虫/受潮)</option>
                <option value="oQlfmR">芯片维修 / IC Repair</option>
                <option value="oxQnsg">更换面罩 / Replace Mask</option>
                <option value="o7cfSA">其他维修 / Others</option>
            </select>
        </div>

        <div id="coordSection" class="form-card hidden">
            <span class="label-text">故障灯珠数量 (Qty)</span>
            <input type="number" id="qty" value="1" min="0" max="5">
            
            <div class="mt-4">
                <span class="label-text">故障定位 (点击下方方格选择 X,Y)</span>
                <div class="coord-grid" id="grid">
                    </div>
                <div class="flex gap-2 mt-2">
                    <input type="text" id="coord_display" readonly placeholder="已选坐标: 未选择">
                </div>
            </div>
        </div>

        <div class="form-card">
            <span class="label-text">故障定位拍照 / Fault Location Photo</span>
            <input type="file" accept="image/*" capture="environment" class="mb-2">
            
            <span class="label-text">备注 / Note (如: U12芯片烧毁)</span>
            <textarea id="note" rows="3" placeholder="填写位号、颜色偏移等详细信息..."></textarea>
        </div>

        <button class="btn-gold" onclick="submitData()">提交维修数据</button>
        <p id="msg" class="text-center mt-4 text-xs text-gray-600"></p>
    </div>

<script>
    // 初始化像素格子 (模拟 16x16 的模组局部)
    const grid = document.getElementById('grid');
    for (let i = 0; i < 256; i++) {
        const p = document.createElement('div');
        p.className = 'pixel';
        p.onclick = function() {
            document.querySelectorAll('.pixel').forEach(el => el.classList.remove('active'));
            this.classList.add('active');
            const x = i % 16;
            const y = Math.floor(i / 16);
            document.getElementById('coord_display').value = `X:${x}, Y:${y}`;
        };
        grid.appendChild(p);
    }

    function toggleFields() {
        const type = document.getElementById('repairType').value;
        const section = document.getElementById('coordSection');
        // 参考你代码中的逻辑：撞灯(o5a5Nj)和缺陷(oIkcgN)需要坐标
        if (type === 'o5a5Nj' || type === 'oIkcgN') {
            section.classList.remove('hidden');
        } else {
            section.classList.add('hidden');
        }
    }

    async function submitData() {
        const msg = document.getElementById('msg');
        msg.innerText = "正在加密并同步至后台...";
        
        // 模拟提交动作
        setTimeout(() => {
            msg.style.color = "#4CAF50";
            msg.innerText = "✅ 数据同步成功！表格已更新。";
            // 这里可以接入你之前的 Google Script URL
        }, 1500);
    }
</script>
</body>
</html>
