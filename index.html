<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>ROE Visual | Professional System Designer v4.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --gold: #c5a059; --bg: #0b0b0b; --card: #1a1a1a; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: #ccc; margin: 0; padding: 20px; font-size: 13px; }
        .wrapper { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 350px 1fr; gap: 20px; }
        .panel { background: var(--card); padding: 20px; border-radius: 4px; border: 1px solid #333; }
        h2 { color: var(--gold); font-size: 14px; text-transform: uppercase; border-bottom: 1px solid #444; padding-bottom: 8px; margin-top: 0; }
        
        /* 输入控件 */
        .group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; color: #888; margin-bottom: 4px; }
        select, input { width: 100%; background: #000; border: 1px solid #444; padding: 8px; color: #fff; box-sizing: border-box; }
        
        /* 结果显示 */
        .res-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .res-item { background: #111; padding: 10px; border-radius: 2px; border-left: 2px solid var(--gold); }
        .res-item label { margin-bottom: 2px; }
        .res-item b { color: #fff; font-size: 14px; }

        /* 连线图绘制 */
        #cabling-plan { background: #fff; padding: 20px; border-radius: 4px; overflow-x: auto; }
        .grid-matrix { display: inline-grid; gap: 2px; background: #ddd; padding: 4px; }
        .module { 
            width: 40px; height: 40px; background: #fff; border: 1px solid #ccc; font-size: 8px; color: #000;
            display: flex; align-items: center; justify-content: center; position: relative;
        }
        .data-line { position: absolute; width: 2px; background: #000; z-index: 5; }

        /* 设备清单样式 */
        .eq-list { font-size: 11px; color: #aaa; line-height: 1.5; }
        .eq-list b { color: var(--gold); }
        .btn-pdf { width: 100%; background: var(--gold); color: #000; border: none; padding: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="wrapper" id="capture-area">
    <div class="panel">
        <h2>General Setup</h2>
        <div class="group">
            <label>LED PANEL</label>
            <select id="pModel" onchange="run()">
                <option value="BP2V2">Black Pearl BP2V2 (P2.84)</option>
                <option value="RB1.5">Ruby RB1.5 (P1.56)</option>
                <option value="CB5">Carbon CB5 (P5.77)</option>
            </select>
        </div>
        <div class="group">
            <label>COLUMNS x ROWS</label>
            <div style="display:flex; gap:10px;">
                <input type="number" id="cols" value="14" oninput="run()">
                <input type="number" id="rows" value="7" oninput="run()">
            </div>
        </div>

        <h2>Technical Specs</h2>
        <div class="res-grid">
            <div class="res-item"><label>Resolution</label><b id="vRes">0x0</b></div>
            <div class="res-item"><label>Total Area</label><b id="vArea">0 m²</b></div>
            <div class="res-item"><label>Comfort Distance</label><b id="vDist">0 m</b></div>
            <div class="res-item"><label>Heat (Max BTU)</label><b id="vBTU">0</b></div>
            <div class="res-item"><label>Max Current</label><b id="vAmp">0 A</b></div>
            <div class="res-item"><label>Total Weight</label><b id="vWeight">0 kg</b></div>
        </div>

        <h2>Equipment List</h2>
        <div class="eq-list" id="vEq"></div>
        <button class="btn-pdf" onclick="exportPDF()">Export Official Report</button>
    </div>

    <div class="panel" style="background: #222;">
        <h2>Suggested Data Cabling (Port Mapping)</h2>
        <div id="cabling-plan">
            <div id="grid-container" class="grid-matrix"></div>
        </div>
        <div style="margin-top:15px; font-size:11px;">
            <span style="color:var(--gold)">■</span> 12-bit / 60Hz logic applied. Port redundancy: None.
        </div>
    </div>
</div>

<script>
    // 参考 PDF 建立的产品字典
    const DB = {
        "BP2V2": { px: 176, kg: 9.3, wMax: 190, pitch: 2.84, btu: 630 },
        "RB1.5": { px: 320, kg: 8.0, wMax: 150, pitch: 1.56, btu: 510 },
        "CB5": { px: 88, kg: 9.0, wMax: 140, pitch: 5.77, btu: 480 }
    };

    const COLORS = ['#FFD700', '#FF6347', '#00CED1', '#9370DB', '#32CD32', '#FFA500', '#1E90FF', '#FF69B4'];

    function run() {
        const modelKey = document.getElementById('pModel').value;
        const config = DB[modelKey];
        const cols = parseInt(document.getElementById('cols').value) || 0;
        const rows = parseInt(document.getElementById('rows').value) || 0;
        const total = cols * rows;

        // 1. 物理计算 (对标 PDF 第 1, 2, 7 页)
        const resW = cols * config.px;
        const resH = rows * config.px;
        const area = (cols * 0.5 * rows * 0.5).toFixed(2);
        const weight = (total * config.kg + cols * 8.4).toFixed(1); // 包含吊梁重量
        const btu = total * config.btu;
        const amps = ((total * config.wMax) / 230).toFixed(1);
        const comfortDist = (config.pitch * 1.725).toFixed(1);

        // 2. 更新数据面板
        document.getElementById('vRes').innerText = `${resW} x ${resH}`;
        document.getElementById('vArea').innerText = area + " m²";
        document.getElementById('vDist').innerText = comfortDist + " m";
        document.getElementById('vBTU').innerText = btu.toLocaleString();
        document.getElementById('vAmp').innerText = amps + " A";
        document.getElementById('vWeight').innerText = weight + " kg";

        // 3. 线缆与资产清单 (对标 PDF 第 7 页)
        const powerCircuits = Math.ceil(amps / 12); // 每路电安全载荷 12A
        document.getElementById('vEq').innerHTML = `
            <b>LED:</b> ${total}x ${modelKey}<br>
            <b>Structure:</b> ${cols}x Hanging Bars (8.4kg ea)<br>
            <b>Power:</b> ${powerCircuits}x First Power (~10m), ${total}x Chain Cables<br>
            <b>Data:</b> 2x Fiber Kits, ${cols}x First Data (10m), ${total}x Data Chains
        `;

        // 4. 动态绘制连线图 (对标 PDF 第 8 页)
        const container = document.getElementById('grid-container');
        container.style.gridTemplateColumns = `repeat(${cols}, 40px)`;
        container.innerHTML = '';

        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const portColor = COLORS[c % COLORS.length];
                const module = document.createElement('div');
                module.className = 'module';
                module.style.backgroundColor = `rgba(${parseInt(portColor.slice(1,3),16)}, 50, 50, 0.05)`;
                module.innerHTML = `
                    <div style="width:4px; height:4px; border-radius:2px; background:${portColor}; margin-bottom:2px;"></div>
                    ${String.fromCharCode(65+c)}-${r+1}
                `;
                
                // 绘制纵向连线
                if (r < rows - 1) {
                    const line = document.createElement('div');
                    line.className = 'data-line';
                    line.style.height = '10px';
                    line.style.bottom = '-6px';
                    line.style.background = portColor;
                    module.appendChild(line);
                }
                container.appendChild(module);
            }
        }
    }

    function exportPDF() {
        const element = document.getElementById('capture-area');
        html2pdf().from(element).set({
            margin: 5,
            filename: 'ROE-Official-Export.pdf',
            html2canvas: { scale: 2, backgroundColor: '#0b0b0b' },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
        }).save();
    }

    window.onload = run;
</script>
</body>
</html>
