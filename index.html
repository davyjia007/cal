<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROE Visual | Pro Cabling Designer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --gold: #c5a059; --bg: #0b0b0b; --card: #1a1a1a; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #ddd; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 320px 1fr; gap: 20px; }
        .panel { background: var(--card); padding: 20px; border-radius: 4px; border: 1px solid #333; }
        h2 { color: var(--gold); font-size: 16px; text-transform: uppercase; margin-top: 0; border-bottom: 1px solid #444; padding-bottom: 10px; }
        
        /* 输入框样式 */
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; color: #888; margin-bottom: 5px; }
        input, select { width: 100%; background: #000; border: 1px solid #444; padding: 10px; color: #fff; border-radius: 4px; }
        
        /* 连线图画布 */
        #cabling-canvas { 
            background: #fff; /* 模拟 PDF 的白色背景 */
            border-radius: 4px; 
            padding: 20px; 
            overflow-x: auto;
            min-height: 400px;
        }
        .screen-grid { display: inline-grid; gap: 2px; background: #eee; padding: 5px; border: 2px solid #333; }
        .cell { 
            width: 45px; height: 45px; background: #fff; border: 1px solid #ccc;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 9px; color: #333; position: relative;
        }
        .dot { width: 6px; height: 6px; border-radius: 50%; margin: 2px; }
        .line { position: absolute; width: 2px; background: #666; z-index: 1; }
        
        /* 统计数据 */
        .stat-box { margin-top: 15px; font-size: 12px; line-height: 1.8; }
        .stat-box b { color: var(--gold); }
        .btn-pdf { width: 100%; background: var(--gold); color: #000; border: none; padding: 12px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container" id="main-app">
    <div class="panel">
        <h2>Configuration</h2>
        <div class="input-group">
            <label>PRODUCT MODEL</label>
            <select id="model" onchange="renderAll()">
                <option value="176,176,9.3,190">BP2V2 (P2.8)</option>
                <option value="88,88,9.0,140">CB5 (P5.7)</option>
                <option value="320,320,8.0,150">Ruby RB1.5</option>
            </select>
        </div>
        <div class="input-group">
            <label>COLUMNS (Width)</label>
            <input type="number" id="cols" value="14" oninput="renderAll()">
        </div>
        <div class="input-group">
            <label>ROWS (Height)</label>
            <input type="number" id="rows" value="7" oninput="renderAll()">
        </div>

        <h2>System Summary</h2>
        <div class="stat-box" id="stats">
            </div>
        <button class="btn-pdf" onclick="exportPDF()">EXPORT PDF REPORT</button>
    </div>

    <div class="panel" style="background: #222;">
        <h2>Suggested Data Cabling (Port View)</h2>
        <div id="cabling-canvas">
            <div id="grid-container" class="screen-grid"></div>
        </div>
        <p style="font-size: 10px; color: #888; margin-top: 10px;">
            * Each color represents a different Data Port (EtherCon). Lines indicate daisy-chaining.
        </p>
    </div>
</div>

<script>
    const COLORS = ['#FFD700', '#FF6347', '#00CED1', '#9370DB', '#32CD32', '#FFA500', '#1E90FF', '#FF69B4'];

    function renderAll() {
        const cols = parseInt(document.getElementById('cols').value) || 0;
        const rows = parseInt(document.getElementById('rows').value) || 0;
        const [px, py, kg, watt] = document.getElementById('model').value.split(',').map(Number);

        // 1. 计算统计数据 (对标 PDF Page 2 & 8)
        const totalPanels = cols * rows;
        const totalW = (totalPanels * watt / 1000).toFixed(2);
        const totalWeight = (totalPanels * kg).toFixed(1);
        const resW = cols * px;
        const resH = rows * py;

        document.getElementById('stats').innerHTML = `
            Resolution: <b>${resW} x ${resH}</b><br>
            Total Area: <b>${(totalPanels * 0.25).toFixed(2)} m²</b><br>
            Total Panels: <b>${totalPanels} pcs</b><br>
            Total Weight: <b>${totalWeight} kg</b><br>
            Max Power: <b>${totalW} kW</b><br>
            Data Ports Used: <b>${cols} Ports</b>
        `;

        // 2. 绘制连线图 (对标 PDF Page 5)
        const grid = document.getElementById('grid-container');
        grid.style.gridTemplateColumns = `repeat(${cols}, 45px)`;
        grid.innerHTML = '';

        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                
                // 模拟官方 PDF 的彩色分块逻辑
                const portColor = COLORS[c % COLORS.length];
                cell.style.background = `rgba(${parseInt(portColor.slice(1,3),16)}, ${parseInt(portColor.slice(3,5),16)}, ${parseInt(portColor.slice(5,7),16)}, 0.1)`;
                
                // 添加上下圆点 (手拉手接口)
                cell.innerHTML = `
                    <div class="dot" style="background:${portColor}"></div>
                    <span style="font-weight:bold">${String.fromCharCode(65 + c)}-${r + 1}</span>
                    <div class="dot" style="background:${portColor}"></div>
                `;

                // 画纵向连线 (除了最后一行)
                if (r < rows - 1) {
                    const line = document.createElement('div');
                    line.className = 'line';
                    line.style.height = '15px';
                    line.style.bottom = '-8px';
                    line.style.background = portColor;
                    cell.appendChild(line);
                }
                
                grid.appendChild(cell);
            }
        }
    }

    function exportPDF() {
        const element = document.getElementById('main-app');
        html2pdf().from(element).set({
            margin: 5,
            filename: 'ROE-Cabling-Plan.pdf',
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
        }).save();
    }

    window.onload = renderAll;
</script>
</body>
</html>
