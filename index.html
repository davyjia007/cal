<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROE Visual | 项目智能报价系统</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --roe-gold: #c5a059;
            --roe-black: #0f0f0f;
            --accent-blue: #0066cc;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: radial-gradient(circle at top, #2c2c2c 0%, #0f0f0f 100%); 
            color: white; min-height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0;
        }

        .card { 
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);
            width: 100%; max-width: 480px; padding: 40px; border-radius: 20px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
        }

        .header { text-align: center; margin-bottom: 30px; }
        /* 使用 ROE 官网风格的文字 Logo 效果 */
        .logo { font-size: 28px; font-weight: 800; letter-spacing: 5px; color: #fff; margin-bottom: 5px; }
        .logo span { color: var(--roe-gold); }
        .subtitle { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 2px; }

        .input-item { margin-bottom: 25px; }
        label { display: block; margin-bottom: 10px; font-size: 13px; color: #bbb; }

        select, input { 
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid #444; 
            padding: 12px; border-radius: 8px; color: white; font-size: 16px; transition: 0.3s;
        }

        select:focus, input:focus { border-color: var(--roe-gold); outline: none; }

        .row { display: flex; gap: 15px; margin-bottom: 25px; }
        .checkbox-card { 
            flex: 1; background: rgba(255,255,255,0.03); padding: 12px; border-radius: 8px;
            display: flex; align-items: center; font-size: 13px; cursor: pointer; border: 1px solid #333;
        }
        .checkbox-card input { width: auto; margin-right: 10px; }

        .btn-main { 
            background: var(--roe-gold); color: black; border: none; padding: 16px; 
            border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; font-size: 16px;
            transition: 0.3s; margin-top: 10px;
        }
        .btn-main:hover { background: #d4af6a; transform: scale(1.02); }

        .btn-outline {
            background: transparent; color: #aaa; border: 1px solid #444; padding: 10px;
            border-radius: 8px; width: 100%; margin-top: 10px; cursor: pointer;
        }

        #result-box { 
            margin-top: 30px; padding: 20px; border-radius: 12px;
            background: rgba(197, 160, 89, 0.1); border: 1px solid rgba(197, 160, 89, 0.3); text-align: center;
        }
        .total-label { font-size: 12px; color: var(--roe-gold); text-transform: uppercase; }
        .total-amount { font-size: 36px; font-weight: bold; margin: 10px 0; color: #fff; }
    </style>
</head>
<body>

<div class="card" id="main-quote">
    <div class="header">
        <div class="logo">ROE<span>VISUAL</span></div>
        <div class="subtitle">Smart Quotation System</div>
    </div>

    <div class="input-item">
        <label>PRODUCT SERIES / 产品系列</label>
        <select id="product">
            <option value="4200">Black Pearl BP2V2 (XR Specialized)</option>
            <option value="3500">Carbon Series CB5 (Outdoor)</option>
            <option value="8800">Ruby RB1.5 (High Resolution)</option>
            <option value="2900">Van Gogh Series (Creative)</option>
        </select>
    </div>

    <div class="input-item">
        <label>TOTAL AREA / 总面积 (㎡)</label>
        <input type="number" id="sqm" value="20">
    </div>

    <div class="row">
        <label class="checkbox-card"><input type="checkbox" id="onsite"> 现场服务</label>
        <label class="checkbox-card"><input type="checkbox" id="tax"> 13% 税率</label>
    </div>

    <button class="btn-main" onclick="calc()">CALCULATE / 计算报价</button>
    <button class="btn-outline" onclick="pdf()">
